<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{login.title}">Вход | Trippzo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<body class="bg-gray-950 text-white min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="absolute inset-0 z-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
</div>

<div class="relative z-10 flex justify-center items-center flex-1 px-4 py-16">

    <div class="w-full max-w-md space-y-8" data-aos="fade-up">
        <div class="text-center">
            <h2 class="text-2xl sm:text-3xl font-bold text-white" th:text="#{login.welcome}">
                Добре дошли обратно
            </h2>

            <p class="mt-2 text-gray-400 text-sm sm:text-base" th:text="#{login.subtitle}">
                Влезте в своя Trippzo акаунт
            </p>
        </div>
        <div class="bg-gray-800/30 backdrop-blur-sm border border-gray-700/50 rounded-2xl p-6 sm:p-8 shadow-xl">
            <div th:if="${param.error}" class="text-red-400 text-sm mb-4">
                <p>Грешка при вход</p>
            </div>
            <form th:action="@{/login}" method="post" class="space-y-4 sm:space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1" th:text="#{login.email.label}">
                        Имейл адрес
                    </label>
                    <input id="email"
                           name="email"  type="email"
                           required
                           class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white ..." />
                </div>
                <div>
                    <label for="password"
                           class="block text-sm sm:text-base font-medium text-gray-300 mb-1"
                           th:text="#{login.password.label}">
                        Парола
                    </label>

                    <input id="password"
                           name="password"
                           type="password"
                           required
                           class="w-full px-4 py-3 sm:py-4 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition" />
                </div>
                <div class="flex items-center justify-between text-sm sm:text-base">
                    <label class="flex items-center text-gray-300 cursor-pointer">
                        <input id="remember-me" name="remember-me" type="checkbox"
                               class="h-4 w-4 text-white border-gray-600 rounded bg-gray-900 focus:ring-0" />
                        <span class="ml-2" th:text="#{login.remember_me}">Запомни ме</span>
                    </label>
                    <a th:href="@{/forgot-password}" class="text-white hover:underline transition-colors" th:text="#{login.forgot_password}">
                        Забравена парола?
                    </a>
                </div>

                <button type="submit"
                        class="w-full py-3 sm:py-4 px-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition shadow-lg"
                        th:text="#{login.submit_btn}">
                    Вход
                </button>

                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-[#111827] px-2 text-gray-500" th:text="#{login.or_continue_with}">
                            Или продължи с
                        </span>
                    </div>
                </div>

                <a th:href="@{/oauth2/authorization/google}"
                   class="w-full flex justify-center items-center gap-3 bg-gray-900 border border-gray-700 text-white p-3 rounded-xl font-bold hover:bg-gray-800 transition">
                    <img th:src="@{/images/google.png}" width="20" height="20">
                    Google
                </a>

            </form>
            <div class="mt-6 text-center text-sm sm:text-base text-gray-400">
                <span th:text="#{login.no_account}">Нямате акаунт?</span>

                <a th:href="@{/register}"
                   class="text-white hover:text-gray-300 font-medium transition-colors"
                   th:text="#{login.register_link}">
                    Регистрирайте се
                </a>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 600,
        easing: 'ease-out',
        once: true
    });
</script>

</body>
</html>
