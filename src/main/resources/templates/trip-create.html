<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{trip.create.title}">Създаване на пътуване - Trippzo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <style>
    body {
      background:
        radial-gradient(900px circle at 20% 0%, rgba(59,130,246,0.18), transparent 40%),
        radial-gradient(800px circle at 80% 20%, rgba(168,85,247,0.12), transparent 45%),
        #05060a;
    }
    .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
    .soft { box-shadow: 0 25px 70px rgba(0,0,0,0.65); }
    input, textarea, select { transition: all .2s ease; }
    input:focus, textarea:focus, select:focus { border-color: rgba(255,255,255,0.3); outline: none; }
    input[type="time"] { color: transparent; font-size: 0; }
    input[type="time"]:valid { color: white; font-size: 1rem; }
    input[type="time"]::-webkit-datetime-edit { color: transparent; font-size: 0; }
    input[type="time"]:valid::-webkit-datetime-edit { color: white; font-size: 1rem; }
    input[type="time"]::-webkit-calendar-picker-indicator { display: none; }
    input[type="time"]::-webkit-datetime-edit-fields-wrapper { background: transparent; }
    input[type="time"]::-webkit-datetime-edit-ampm-field { display: none; }
    .flatpickr-calendar { z-index: 9999 !important; background: #12121a !important; border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 20px 60px rgba(0,0,0,0.6) !important; }
    .flatpickr-day { color: #e5e7eb !important; }
    .flatpickr-day:hover { background: rgba(255,255,255,0.1) !important; }
    .flatpickr-day.selected { background: white !important; color: black !important; }
  </style>
</head>

<body class="text-white min-h-screen flex flex-col">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow max-w-3xl mx-auto px-6 py-14">

  <div class="text-center mb-10">
    <h1 class="text-4xl font-bold" th:text="#{trip.create.hero.title}">Създай пътуване</h1>
    <p class="text-white/50 mt-2" th:text="#{trip.create.hero.subtitle}">Сподели маршрут и намери пътници</p>
  </div>

  <div th:if="${tripDto == null}" class="glass soft rounded-3xl p-8 mb-8 border border-red-500/30 text-center">
    <p class="text-red-400 font-bold text-xl mb-2">⚠️ Липсващ Модел</p>
    <p class="text-white/70">
      Обектът <b>tripDto</b> не стига до HTML-а. Увери се, че в <code>TripController.java</code> имаш: <br>
      <code class="block mt-2 bg-black/50 p-2 rounded text-sm text-green-400">model.addAttribute("tripDto", new TripCreateDTO());</code>
    </p>
  </div>

  <form th:if="${tripDto != null}" th:action="@{/trips/create}" th:object="${tripDto}" method="post"
        class="glass soft rounded-3xl p-8 space-y-8">

    <div>
      <h2 class="text-lg font-semibold mb-4" th:text="#{trip.create.section.route}">Маршрут</h2>
      <div class="space-y-4">
        <div>
          <input type="text" th:field="*{origin}" th:placeholder="#{trip.create.placeholder.origin}"
                 class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10"/>
          <p th:if="${#fields.hasErrors('origin')}" th:errors="*{origin}"
             class="text-red-400 text-xs mt-1"></p>
        </div>

        <div>
          <input type="text" th:field="*{destination}" th:placeholder="#{trip.create.placeholder.destination}"
                 class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10"/>
          <p th:if="${#fields.hasErrors('destination')}" th:errors="*{destination}"
             class="text-red-400 text-xs mt-1"></p>
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-lg font-semibold mb-4" th:text="#{trip.create.section.time}">Време</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <input type="text" id="departureDate" th:field="*{departureDate}"
                 th:placeholder="#{trip.create.placeholder.date}"
                 class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10 cursor-pointer"/>
          <p th:if="${#fields.hasErrors('departureDate')}" th:errors="*{departureDate}"
             class="text-red-400 text-xs mt-1"></p>
        </div>

        <div class="relative">
          <input type="text" id="departureTime" th:field="*{departureTime}" placeholder="HH:MM"
                 pattern="^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$"
                 class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10 peer placeholder-transparent text-white"/>
          <label for="departureTime" id="timeLabelInner" class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-white/50 peer-focus:top-2 peer-focus:-translate-y-0 peer-focus:text-xs peer-focus:text-white/40 transition-all pointer-events-none" th:text="#{trip.create.placeholder.time}">Час</label>
          <p th:if="${#fields.hasErrors('departureTime')}" th:errors="*{departureTime}"
             class="text-red-400 text-xs mt-1"></p>
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-lg font-semibold mb-4" th:text="#{trip.create.section.details}">Детайли и Цена</h2>
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <select th:field="*{seatsTotal}"
                  class="w-full h-12 px-4 rounded-xl bg-[#0a0a0f] border border-white/10 text-white focus:border-white/30 outline-none">
            <option value="" th:text="#{trip.create.seats.label}">Места</option>
            <option th:each="i : ${#numbers.sequence(1,7)}" th:value="${i}" th:text="${i}"></option>
          </select>
          <p th:if="${#fields.hasErrors('seatsTotal')}" th:errors="*{seatsTotal}"
             class="text-red-400 text-xs mt-1"></p>
        </div>

        <div>
          <input type="number" step="0.50" th:field="*{pricePerSeat}"
                 th:placeholder="#{trip.create.placeholder.price}"
                 class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10"/>
          <p th:if="${#fields.hasErrors('pricePerSeat')}" th:errors="*{pricePerSeat}"
             class="text-red-400 text-xs mt-1"></p>
        </div>
      </div>

      <div>
        <input type="text" th:field="*{car}" th:placeholder="#{trip.create.placeholder.car}"
               class="w-full h-12 px-4 rounded-xl bg-white/5 border border-white/10"/>
        <p th:if="${#fields.hasErrors('car')}" th:errors="*{car}"
           class="text-red-400 text-xs mt-1"></p>
      </div>
    </div>

    <div>
      <h2 class="text-lg font-semibold mb-4" th:text="#{trip.create.section.description}">Описание</h2>
      <textarea th:field="*{description}" rows="4"
                class="w-full p-4 rounded-xl bg-white/5 border border-white/10"
                th:placeholder="#{trip.create.placeholder.desc}"></textarea>
      <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}"
         class="text-red-400 text-xs mt-1"></p>
    </div>

    <button type="submit"
            class="w-full bg-white text-black font-bold py-4 rounded-xl hover:scale-[1.02] transition soft"
            th:text="#{trip.create.btn.submit}">
      Създай пътуване
    </button>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script th:if="${#locale.language == 'bg'}"
        src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/bg.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const el = document.getElementById("departureDate");
    const lang = document.documentElement.lang || 'bg';
    if (el) {
      flatpickr(el, {
        dateFormat: "d-m-Y",
        minDate: "today",
        allowInput: false,
        disableMobile: true,
        locale: lang === 'bg' ? 'bg' : 'en'
      });
    }

    const timeInput = document.getElementById("departureTime");
    const timeLabel = document.getElementById("timeLabelInner");

    function updateLabelVisibility() {
      if (timeInput.value) {
        timeLabel.classList.add("hidden");
      } else {
        timeLabel.classList.remove("hidden");
      }
    }

    if (timeInput) {
      timeInput.addEventListener("input", updateLabelVisibility);
      timeInput.addEventListener("change", updateLabelVisibility);
      // Check initial state
      updateLabelVisibility();
    }
  });
</script>

</body>
</html>
