<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{forgot.password.title}">Забравена парола | Trippzo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<body class="bg-gray-950 text-white min-h-screen flex flex-col">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="absolute inset-0 z-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
</div>

<div class="relative z-10 flex justify-center items-center flex-1 px-4 py-16">
    <div class="w-full max-w-md space-y-8" data-aos="fade-up">
        <div class="text-center">
            <h2 class="text-2xl sm:text-3xl font-bold text-white" th:text="#{forgot.password.header}">
                Възстановяване на парола
            </h2>
            <p class="mt-2 text-gray-400 text-sm sm:text-base" th:text="#{forgot.password.subtitle}">
                Въведете вашия имейл за да получите инструкции
            </p>
        </div>

        <div class="bg-gray-800/30 backdrop-blur-sm border border-gray-700/50 rounded-2xl p-6 sm:p-8 shadow-xl">
            <div th:if="${message}" class="text-green-400 text-sm mb-4 p-3 bg-green-500/10 rounded-lg">
                <p th:text="${message}"></p>
            </div>
            <div th:if="${error}" class="text-red-400 text-sm mb-4 p-3 bg-red-500/10 rounded-lg">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/forgot-password}" method="post" class="space-y-4 sm:space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1" th:text="#{forgot.password.label.email}">
                        Имейл адрес
                    </label>
                    <input id="email"
                           name="email"
                           type="email"
                           required
                           class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition"
                           th:placeholder="#{forgot.password.placeholder.email}" />
                </div>

                <button type="submit"
                        class="w-full py-3 sm:py-4 px-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition shadow-lg"
                        th:text="#{forgot.password.btn}">
                    Изпрати инструкции
                </button>

                <div class="text-center text-sm sm:text-base text-gray-400">
                    <a th:href="@{/login}"
                       class="text-white hover:text-gray-300 font-medium transition-colors"
                       th:text="#{forgot.password.back_to_login}">
                        Върни се към вход
                    </a>
                </div>
            </form>
        </div>

        <div class="bg-blue-500/10 border border-blue-500/20 rounded-lg p-4 text-sm text-gray-300">
            <p th:text="#{forgot.password.hint}">Ако имейлът е регистриран в нашата система, ще получите писмо със линк за възстановяване на паролата.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 600,
        easing: 'ease-out',
        once: true
    });
</script>
</body>
</html>
