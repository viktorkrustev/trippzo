<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="navbar">

  <nav class="sticky top-0 z-50 w-full bg-black/20 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-20 relative">

        <a href="/" class="text-2xl font-extrabold text-white tracking-tight">
          Trippzo<span class="text-sky-500">.</span>
        </a>

        <div class="hidden md:flex absolute left-1/2 -translate-x-1/2">
          <div class="flex items-center space-x-10 text-[13px] font-semibold uppercase tracking-wide">
            <a href="/" class="text-zinc-400 hover:text-white transition" th:text="#{nav.home}">Начало</a>
            <a href="/trips/search" class="text-zinc-400 hover:text-white transition" th:text="#{nav.search}">Търсене</a>
            <a href="/trips/create" class="text-zinc-400 hover:text-white transition" th:text="#{nav.create}">Създаване</a>
            <a href="/profile" sec:authorize="isAuthenticated()" class="text-zinc-400 hover:text-white transition" th:text="#{nav.profile}">Профил</a>

            <a href="/chat" sec:authorize="isAuthenticated()"
               class="relative flex items-center gap-2 text-zinc-400 hover:text-white transition group">
              <span th:text="#{nav.messages}">Съобщения</span>
              <span id="messageBadge"
                    class="text-[10px] bg-sky-500 text-white px-1.5 py-0.5 rounded-full leading-none hidden font-bold shadow-sm">
              </span>
            </a>

            <a href="/notifications" sec:authorize="isAuthenticated()"
               class="relative flex items-center text-zinc-400 hover:text-white transition group px-1">
              <span th:text="#{nav.notifications}">Известия</span>
              <span id="notificationBadge"
                    class="absolute -top-1 -right-3 min-w-[18px] h-[18px] bg-red-600 text-white text-[10px] rounded-full flex items-center justify-center font-bold px-1 hidden shadow-lg border border-black/10 leading-none">
              </span>
            </a>
          </div>
        </div>

        <div class="flex items-center space-x-6 text-xs font-semibold uppercase">

          <div class="flex items-center space-x-2 mr-4 border-r border-white/10 pr-4">
            <a th:href="@{/locale(lang='bg')}"
               class="text-zinc-500 hover:text-sky-400 transition font-bold text-xs">BG</a>

            <span class="text-zinc-700">|</span>

            <a th:href="@{/locale(lang='en')}"
               class="text-zinc-500 hover:text-sky-400 transition font-bold text-xs">EN</a>
          </div>

          <div sec:authorize="!isAuthenticated()" class="hidden md:flex items-center space-x-6">
            <a href="/login" class="text-zinc-300 hover:text-white transition" th:text="#{nav.login}">Вход</a>
            <a href="/register" class="bg-white text-black px-4 py-2 rounded-full font-bold hover:bg-zinc-200 transition" th:text="#{nav.register}">
              Регистрация
            </a>
          </div>

          <div sec:authorize="isAuthenticated()" class="hidden md:block">
            <form th:action="@{/logout}" method="post">
              <button class="text-zinc-400 hover:text-red-400 transition cursor-pointer bg-transparent border-none outline-none font-bold text-xs uppercase" th:text="#{nav.logout}">
                Изход
              </button>
            </form>
          </div>

          <button id="menuBtn" class="md:hidden text-white text-2xl focus:outline-none p-2">☰</button>
        </div>

      </div>
    </div>
  </nav>

  <div id="overlay" class="fixed inset-0 bg-black/75 backdrop-blur-sm hidden z-40"></div>

  <div id="mobileMenu"
       class="fixed top-0 right-0 w-[85%] max-w-[400px] h-full bg-[#050505] z-[100]
            transform translate-x-full transition-transform duration-500 ease-in-out
            border-l border-white/5 flex flex-col shadow-2xl">

    <div class="flex items-center justify-between p-6 border-b border-white/5">
      <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-sky-500 to-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-sky-500/20">
          <span th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold" th:text="#{nav.welcome}">Здравей,</span>
          <span class="text-sm font-bold text-white leading-tight" th:text="${#authentication.name}">Потребител</span>
        </div>
      </div>

      <button id="closeMenuBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-zinc-400 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="flex-grow overflow-y-auto py-8 px-6 space-y-2">

      <span class="block text-[10px] font-black text-zinc-600 uppercase tracking-[0.3em] mb-4" th:text="#{nav.menu_label}">Меню</span>

      <a href="/" class="flex items-center group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-sky-500/10 flex items-center justify-center text-sky-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.home}">Начало</span>
        </div>
      </a>

      <a href="/trips/search" class="flex items-center justify-between group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-purple-500/10 flex items-center justify-center text-purple-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.search}">Търсене</span>
        </div>
      </a>

      <a href="/trips/create" class="flex items-center justify-between group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.create}">Създаване</span>
        </div>
      </a>

      <div class="h-px bg-white/5 my-6"></div>

      <span sec:authorize="isAuthenticated()" class="block text-[10px] font-black text-zinc-600 uppercase tracking-[0.3em] mb-4" th:text="#{nav.personal_label}">Лични</span>

      <a href="/profile" sec:authorize="isAuthenticated()" class="flex items-center justify-between group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-orange-500/10 flex items-center justify-center text-orange-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.profile}">Моят профил</span>
        </div>
      </a>

      <a href="/chat" sec:authorize="isAuthenticated()" class="flex items-center justify-between group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.messages}">Съобщения</span>
        </div>
        <span id="messageMobileBadge" class="px-2 py-0.5 bg-sky-500 text-white text-[10px] rounded-full font-bold hidden shadow-lg shadow-sky-500/20">0</span>
      </a>

      <a href="/notifications" sec:authorize="isAuthenticated()" class="flex items-center justify-between group p-4 rounded-2xl hover:bg-white/[0.03] transition-all">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-red-500/10 flex items-center justify-center text-red-400 group-hover:scale-110 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          </div>
          <span class="text-sm font-semibold text-zinc-300 group-hover:text-white transition-colors" th:text="#{nav.notifications}">Известия</span>
        </div>
        <span id="notificationMobileBadge" class="px-2 py-0.5 bg-red-600 text-white text-[10px] rounded-full font-bold hidden shadow-lg shadow-red-500/20">0</span>
      </a>
    </div>

    <div class="p-6 bg-white/[0.02] border-t border-white/5">
      <div sec:authorize="!isAuthenticated()" class="space-y-3">
        <a href="/login" class="block w-full text-center py-4 rounded-2xl font-bold text-sm text-white hover:bg-white/5 transition-all" th:text="#{nav.login}">Вход</a>
        <a href="/register" class="block w-full text-center py-4 rounded-2xl bg-white text-black font-bold text-sm shadow-xl hover:bg-zinc-200 transition-all" th:text="#{nav.register}">Регистрация</a>
      </div>

      <div sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post">
          <button class="w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500/20 transition-all font-bold text-xs uppercase tracking-[0.2em]" th:text="#{nav.logout}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Изход
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const btn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeMenuBtn");
      const menu = document.getElementById("mobileMenu");
      const overlay = document.getElementById("overlay");

      const toggleMenu = (isOpen) => {
        menu.classList.toggle("translate-x-full", !isOpen);
        overlay.classList.toggle("hidden", !isOpen);
        document.body.style.overflow = isOpen ? "hidden" : "";
      };

      btn?.addEventListener("click", () => toggleMenu(true));
      closeBtn?.addEventListener("click", () => toggleMenu(false));
      overlay?.addEventListener("click", () => toggleMenu(false));

      const updateBadges = (count, desktopId, mobileId) => {
        const dBadge = document.getElementById(desktopId);
        const mBadge = document.getElementById(mobileId);

        const num = parseInt(count);

        if (!isNaN(num) && num > 0) {
          if (dBadge) {
            dBadge.textContent = num;
            dBadge.classList.remove("hidden");
            dBadge.classList.add("flex");
          }
          if (mBadge) {
            mBadge.textContent = num;
            mBadge.classList.remove("hidden");
            mBadge.classList.add("flex");
          }
        } else {
          dBadge?.classList.add("hidden");
          mBadge?.classList.add("hidden");
        }
      };

      const fetchData = async () => {
        try {

          const notifRes = await fetch("/notifications/unread/count", {
            credentials: "include"
          });

          if (notifRes.ok) {
            const text = await notifRes.text();
            updateBadges(text, "notificationBadge", "notificationMobileBadge");
          }

          const msgRes = await fetch("/chat/unread/count", {
            credentials: "include"
          });

          if (msgRes.ok) {
            const text = await msgRes.text();
            updateBadges(text, "messageBadge", "messageMobileBadge");
          }

        } catch (e) {
          console.error("Badge update failed:", e);
        }
      };

      const isAuthenticated =
          document.body.dataset.authenticated === "true";

      if (isAuthenticated) {
        fetchData();
        setInterval(fetchData, 10000);
      }

    });
  </script>

</div>

</body>
</html>
