<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Търсене на пътувания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .flatpickr-calendar {
            background: #1a1a24 !important;
            border: 1px solid #333340 !important;
            box-shadow: 0 10px 40px -3px rgba(0, 0, 0, 0.3) !important;
            border-radius: 12px !important;
        }
        .flatpickr-day {
            color: #e5e7eb !important;
        }
        .flatpickr-day:hover {
            background: #2d2d3d !important;
            color: #fff !important;
        }
        .flatpickr-day.selected {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%) !important;
            border-color: #0ea5e9 !important;
            color: #fff !important;
        }
        .flatpickr-day.today {
            border-color: #6366f1 !important;
        }
        .flatpickr-current-month {
            background: #12121a !important;
            padding: 10px 0 !important;
            border-radius: 8px 8px 0 0 !important;
        }
        .flatpickr-current-month input.cur-year {
            color: #fff !important;
            background: #1a1a24 !important;
            border: 1px solid #333340 !important;
            padding: 4px 8px !important;
            border-radius: 4px !important;
        }
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            background: #1a1a24 !important;
        }
        .flatpickr-prev-month, .flatpickr-next-month {
            color: #9ca3af !important;
            fill: #9ca3af !important;
        }
        .numInputWrapper span {
            border-right: 1px solid #333340 !important;
        }

        input:focus, button:focus {
            outline: none !important;
            border-color: #0ea5e9 !important;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #12121a; }
        ::-webkit-scrollbar-thumb { background: #333340; border-radius: 3px; }
    </style>
</head>

<body class="bg-[#0a0a0f] text-white font-sans antialiased">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="min-h-screen px-4 py-10">
    <div class="max-w-5xl mx-auto">

        <h1 class="text-3xl md:text-4xl font-bold mb-10 text-center md:text-left text-white tracking-tight">
            Търсене на пътувания
        </h1>

        <form method="get" action="/trips/search"
              class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">

            <div class="relative">
                <input type="text" name="from" placeholder="Начална точка"
                       th:value="${param.from}"
                       class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl px-4 py-3 pl-10
                              focus:ring-1 focus:ring-cyan-500 hover:border-gray-600 transition-all duration-200
                              placeholder-gray-500 text-sm shadow-md" />
            </div>

            <div class="relative">
                <input type="text" name="to" placeholder="Крайна точка"
                       th:value="${param.to}"
                       class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl px-4 py-3 pl-10
                              focus:ring-1 focus:ring-cyan-500 hover:border-gray-600 transition-all duration-200
                              placeholder-gray-500 text-sm shadow-md" />
            </div>

            <div class="relative">
                <input type="text" name="date" placeholder="Изберете дата"
                       th:value="${param.date}"
                       class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl px-4 py-3 pl-10
                              focus:ring-1 focus:ring-cyan-500 hover:border-gray-600 transition-all duration-200
                              placeholder-gray-500 text-sm shadow-md" />
            </div>

            <button type="submit"
                    class="w-full bg-white text-black font-medium py-3 rounded-xl
                           transition-all duration-200 flex items-center justify-center space-x-2 text-sm shadow-lg border border-white">
                <span>Търси</span>
            </button>

        </form>

        <div th:if="${trips != null and not #lists.isEmpty(trips)}" class="space-y-4">
            <div th:each="trip : ${trips}"
                 class="bg-[#12121a] border border-gray-800 rounded-2xl p-6
                        shadow-[0_2px_15px_-3px_rgba(0,0,0,0.3)] hover:shadow-xl hover:border-gray-700 transition-all duration-300
                        flex flex-col md:flex-row justify-between gap-6 group">

                <div class="flex-1 space-y-5">
                    <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                        <div class="flex items-center space-x-2">
                            <p class="font-bold text-white text-lg" th:text="${trip.origin}">От</p>
                        </div>
                        <span class="text-gray-600 hidden md:block text-xl">→</span>
                        <div class="flex items-center space-x-2">
                            <p class="font-bold text-white text-lg" th:text="${trip.destination}">До</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-sm">
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Дата и час</p>
                            <p class="text-gray-300 font-medium"
                               th:text="${#temporals.format(trip.departureDateTime, 'dd.MM.yyyy HH:mm')}">
                                01.08.2025 12:00
                            </p>
                        </div>
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Шофьор</p>
                            <p class="text-gray-300 font-medium"
                               th:text="${trip.driver != null ? trip.driver.fullName : 'Неизвестен'}">
                                Иван Иванов
                            </p>
                        </div>
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Места</p>
                            <p class="text-gray-300 font-medium"
                               th:text="|${trip.seatsTotal} налични|">
                                3 налични
                            </p>
                        </div>
                        <div class="flex md:justify-end items-center">
                            <a th:href="@{'/trips/' + ${trip.id}}"
                               class="px-6 py-2.5 bg-white text-black font-semibold
                                      text-sm rounded-xl border border-white shadow-md">
                                Детайли
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${trips != null and #lists.isEmpty(trips)}"
             class="text-center text-gray-400 mt-20 py-16 border-2 border-dashed border-gray-800 rounded-2xl bg-[#12121a]">
            <p class="text-lg font-semibold text-gray-300">Няма намерени пътувания</p>
            <p class="text-sm text-gray-500 mt-1">Опитайте с различни критерии за търсене</p>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("input[name='date']", {
        dateFormat: "Y-m-d",
        minDate: "today",
        allowInput: true
    });
</script>

</body>
</html>
