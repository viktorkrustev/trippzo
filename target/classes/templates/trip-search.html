<!DOCTYPE html>
<!-- [FIX 3 продължение] lang="bg" беше хардкоднато и тук -->
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{search.title}"></title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
          background:
            radial-gradient(900px circle at 10% 0%, rgba(59,130,246,0.18), transparent 40%),
            radial-gradient(800px circle at 90% 20%, rgba(168,85,247,0.12), transparent 45%),
            #05060a;
        }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
        .soft { box-shadow: 0 25px 70px rgba(0,0,0,0.65); }
        .card-hover { transition: all .25s ease; }
        .card-hover:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .flatpickr-calendar { position: absolute !important; display: none !important; z-index: 99999 !important; background: #12121a !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .flatpickr-calendar.open { display: block !important; }
        .flatpickr-day { color: #e5e7eb !important; }
        .flatpickr-day.selected { background: white !important; color: black !important; }
    </style>
</head>

<body class="text-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="max-w-5xl mx-auto px-6 pt-14 pb-8">
    <p class="text-blue-400 text-sm uppercase tracking-widest font-medium"
       th:text="#{search.label}"></p>
    <h1 class="text-4xl md:text-5xl font-bold mt-2" th:text="#{search.heading}"></h1>
    <p class="text-white/50 mt-2" th:text="#{search.subtitle}"></p>
</div>

<div class="max-w-5xl mx-auto px-6 mb-12">
    <form method="get" th:action="@{/trips/search}" class="glass soft rounded-3xl p-5">
        <div class="grid md:grid-cols-4 gap-3">

            <input name="from"
                   th:placeholder="#{search.from}"
                   th:value="${from}"
                   class="h-12 px-4 rounded-xl bg-white/5 border border-white/10 focus:border-white/30 outline-none"/>

            <input name="to"
                   th:placeholder="#{search.to}"
                   th:value="${to}"
                   class="h-12 px-4 rounded-xl bg-white/5 border border-white/10 focus:border-white/30 outline-none"/>

            <!-- [FIX 6] th:value="${param.from}" и "${param.date}" → "${from}" и "${date}".
                 param.from връща String[] в Thymeleaf при определени конфигурации.
                 Контролерът вече подава from/to/date като model attributes — ползваме тях. -->
            <input id="datePicker"
                   name="date"
                   th:placeholder="#{search.date}"
                   th:value="${date}"
                   class="h-12 px-4 rounded-xl bg-white/5 border border-white/10 focus:border-white/30 outline-none"/>

            <button class="h-12 bg-white text-black font-bold rounded-xl hover:scale-[1.02] transition soft"
                    th:text="#{search.button}"></button>
        </div>
    </form>
</div>

<div class="max-w-5xl mx-auto px-6 space-y-4">

    <div th:each="trip : ${trips}" class="glass soft rounded-2xl p-6 card-hover">

        <div class="flex justify-between items-start mb-4">
            <div class="text-xl font-bold">
                <span th:text="${trip.origin}"></span>
                <span class="text-white/30">→</span>
                <span th:text="${trip.destination}"></span>
            </div>

            <div class="text-right">
                <div class="text-2xl font-black text-white mb-1">
                    <span th:text="${#numbers.formatDecimal(trip.pricePerSeat, 1, 2)}"></span>
                    <span class="text-xs font-normal text-white/50">€</span>
                </div>
                <a th:href="@{'/trips/' + ${trip.id}}"
                   class="inline-block bg-white text-black px-5 py-2 rounded-xl font-semibold text-sm hover:bg-gray-200 transition"
                   th:text="#{search.details}"></a>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-4 text-sm">
            <div>
                <p class="text-white/40 text-xs uppercase" th:text="#{search.date.label}"></p>
                <p class="font-medium"
                   th:text="${#temporals.format(trip.departureDateTime,'dd.MM.yyyy HH:mm')}"></p>
            </div>

            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full overflow-hidden bg-white/10 flex items-center justify-center">
                    <img th:if="${trip.driver != null and trip.driver.avatarUrl != null and trip.driver.avatarUrl != ''}"
                         th:src="${trip.driver.avatarUrl}" class="w-full h-full object-cover"/>
                    <span th:unless="${trip.driver != null and trip.driver.avatarUrl != null and trip.driver.avatarUrl != ''}"
                          class="text-white/60 text-lg">👤</span>
                </div>
                <div>
                    <p class="text-white/40 text-xs uppercase" th:text="#{search.driver}"></p>
                    <p class="font-medium">
                        <span th:if="${trip.driver != null}" th:text="${trip.driver.fullName}"></span>
                        <span th:unless="${trip.driver != null}" th:text="#{search.unknown}"></span>
                    </p>
                </div>
            </div>

            <div>
                <p class="text-white/40 text-xs uppercase" th:text="#{search.rating}"></p>
                <p class="text-yellow-400 font-semibold">
          <span th:with="rating=${trip.driver != null ? driverRatings.get(trip.driver.id) : null}"
                th:text="'⭐ ' + ${rating != null ? #numbers.formatDecimal(rating,1,1) : '0'}">
          </span>
                </p>
            </div>
        </div>
    </div>
</div>

<div th:if="${totalPages > 1}"
     class="max-w-5xl mx-auto px-6 py-10 flex justify-center gap-2">
    <a th:if="${currentPage > 0}"
       th:href="@{/trips/search(from=${from}, to=${to}, date=${date}, page=${currentPage - 1})}"
       class="px-4 py-2 glass rounded-lg hover:bg-white/10 transition"
       th:text="#{search.prev}"></a>

    <div class="flex gap-1">
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:href="@{/trips/search(from=${from}, to=${to}, date=${date}, page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? 'bg-white text-black' : 'glass hover:bg-white/10'"
           class="w-10 h-10 flex items-center justify-center rounded-lg font-bold transition">
        </a>
    </div>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/trips/search(from=${from}, to=${to}, date=${date}, page=${currentPage + 1})}"
       class="px-4 py-2 glass rounded-lg hover:bg-white/10 transition"
       th:text="#{search.next}"></a>
</div>

<div th:if="${trips != null and #lists.isEmpty(trips)}"
     class="max-w-3xl mx-auto text-center mt-20 glass p-10 rounded-3xl">
    <p class="text-xl font-semibold" th:text="#{search.empty}"></p>
    <p class="text-white/50 mt-2" th:text="#{search.empty.subtitle}"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
      flatpickr("#datePicker", {
        dateFormat: "Y-m-d",
        minDate: "today",
        allowInput: false,
        disableMobile: true
      });
    });
</script>

</body>
</html>
