<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="#{notif.title}">Известия</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(1000px circle at 20% 10%, rgba(59,130,246,0.18), transparent 40%),
        radial-gradient(900px circle at 80% 20%, rgba(168,85,247,0.15), transparent 45%),
        radial-gradient(700px circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%),
        #05060a;
    }
    .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(18px); }
    .soft { box-shadow: 0 20px 70px rgba(0,0,0,0.65); }
  </style>
</head>

<body class="text-white min-h-screen">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="max-w-4xl mx-auto px-6 py-14">

  <div class="mb-10">
    <p class="text-blue-400 text-sm uppercase tracking-widest font-medium" th:text="#{notif.hero.tag}">
      Управление
    </p>
    <h1 class="text-4xl md:text-5xl font-bold mt-2" th:text="#{notif.hero.title}">
      Известия
    </h1>
    <p class="text-white/50 mt-2" th:text="#{notif.hero.subtitle}">
      Управление на заявки за място
    </p>
  </div>

  <div th:if="${successMessage}" class="mb-6 p-4 bg-green-500/20 border border-green-500 rounded-xl text-green-300">
    <p th:text="${successMessage}"></p>
  </div>
  <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-500/20 border border-red-500 rounded-xl text-red-300">
    <p th:text="${errorMessage}"></p>
  </div>

  <div th:if="${!notifications.isEmpty()}" class="space-y-4">

    <div class="text-right mb-6">
      <form th:action="@{/notifications/delete-all}" method="post" class="inline"
            onsubmit="return confirm('Сигурни ли сте, че искате да изтриете всички известия?')">
        <button type="submit" class="px-4 py-2 bg-red-500/20 text-red-300 rounded-lg hover:bg-red-500/30 transition font-semibold text-sm">
          🗑️ <span th:text="#{notif.delete_all}">Изтрий всички</span>
        </button>
      </form>
    </div>

    <!-- [FIX 4] Enum сравнение чрез .name() — единственият надежден начин в Thymeleaf.
         Преди: notification.status == 'PENDING' → ВИНАГИ false след миграцията към enum,
         защото Thymeleaf сравнява enum обект с String литерал.
         Сега: notification.status.name() == 'PENDING' → сравнява String с String. -->
    <div th:each="notification : ${notifications}"
         th:classappend="${notification.status.name() == 'PENDING'} ? 'border-blue-500/50 bg-blue-500/5' : ''"
         class="glass rounded-2xl p-6 soft transition hover:bg-white/5 flex justify-between items-start gap-4">

      <div class="flex-1">
        <div class="mb-3">
          <span th:if="${notification.type.name() == 'SEAT_REQUEST'}"
                class="inline-block px-3 py-1 bg-blue-500/20 text-blue-300 rounded-full text-xs font-semibold"
                th:text="'🎫 ' + #{notif.type.seat_request}">
          </span>
          <span th:if="${notification.type.name() == 'SEAT_ACCEPTED'}"
                class="inline-block px-3 py-1 bg-green-500/20 text-green-300 rounded-full text-xs font-semibold"
                th:text="'✅ ' + #{notif.type.seat_accepted}">
          </span>
          <span th:if="${notification.type.name() == 'SEAT_REJECTED'}"
                class="inline-block px-3 py-1 bg-red-500/20 text-red-300 rounded-full text-xs font-semibold"
                th:text="'❌ ' + #{notif.type.seat_rejected}">
          </span>
        </div>

        <p class="text-lg font-semibold mb-2">
          <span th:text="${notification.sender.fullName}"></span>
        </p>

        <p class="text-white/70 mb-3" th:text="${notification.message}"></p>

        <div class="flex items-center gap-2 text-sm text-white/50 mb-4">
          <span th:text="${notification.trip.origin}"></span>
          <span class="text-white/30">→</span>
          <span th:text="${notification.trip.destination}"></span>
          <span class="text-white/30">•</span>
          <span th:text="${#temporals.format(notification.trip.departureDateTime, 'dd.MM.yyyy HH:mm')}"></span>
        </div>

        <p class="text-xs text-white/40"
           th:text="${#temporals.format(notification.createdAt, 'dd.MM.yyyy HH:mm')}"></p>
      </div>

      <div class="flex flex-col gap-2 min-w-max">

        <!-- [FIX 5] И двата enum-а се проверяват с .name() -->
        <div th:if="${notification.status.name() == 'PENDING' and notification.type.name() == 'SEAT_REQUEST'}"
             class="flex flex-col gap-2">
          <form th:action="@{'/notifications/' + ${notification.id} + '/accept'}" method="post">
            <button type="submit"
                    class="w-full px-3 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition font-semibold text-xs whitespace-nowrap">
              ✅ <span th:text="#{notif.actions.accept}">Приеми</span>
            </button>
          </form>
          <form th:action="@{'/notifications/' + ${notification.id} + '/reject'}" method="post">
            <button type="submit"
                    class="w-full px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-semibold text-xs whitespace-nowrap">
              ❌ <span th:text="#{notif.actions.reject}">Откажи</span>
            </button>
          </form>
        </div>

        <!-- [FIX 6] th:on-submit → onsubmit (невалиден Thymeleaf атрибут преди) -->
        <form th:action="@{'/notifications/' + ${notification.id} + '/delete'}" method="post"
              onsubmit="return confirm('Сигурни ли сте, че искате да изтриете това известие?')">
          <button type="submit"
                  class="w-full px-3 py-2 bg-red-500/20 text-red-300 rounded-lg hover:bg-red-500/30 transition font-semibold text-xs whitespace-nowrap">
            🗑️ <span th:text="#{notif.actions.delete}">Трий</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <div th:if="${notifications.isEmpty()}" class="glass rounded-2xl p-12 soft text-center">
    <p class="text-white/50 text-lg" th:text="'🔔 ' + #{notif.empty.title}">🔔 Няма известия</p>
    <p class="text-white/30 text-sm mt-2" th:text="#{notif.empty.subtitle}">
      Известията ще се появят, когато някой поиска място на вашето пътуване
    </p>
  </div>

</div>

</body>
</html>
