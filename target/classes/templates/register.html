<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="#{register.title}">Регистрация | Trippzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
  <div class="absolute top-1/4 left-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 right-1/4 w-72 sm:w-96 h-72 sm:h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
</div>

<div class="relative z-10 flex justify-center items-center flex-1 px-4 py-12 sm:py-20">
  <div class="w-full max-w-xl sm:max-w-2xl space-y-8" data-aos="fade-up">

    <div class="text-center">
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white" th:text="#{register.hero.title}">
        Създайте акаунт
      </h2>
      <p class="mt-2 text-gray-400 text-sm sm:text-base" th:text="#{register.hero.subtitle}">
        Присъединете се към Trippzo общността
      </p>
    </div>

    <div class="bg-gray-800/30 backdrop-blur-sm border border-gray-700/50 rounded-2xl p-6 sm:p-10 shadow-xl">

      <div th:if="${error}" class="text-red-400 text-sm mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
        <p th:text="${error}"></p>
      </div>

      <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-6">

        <div>
          <label for="fullName" class="block text-sm sm:text-base font-medium text-gray-300 mb-2" th:text="#{register.label.fullname}">Пълно име</label>
          <input id="fullName" th:field="*{fullName}" type="text" required
                 class="w-full px-4 sm:px-5 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-200"
                 th:placeholder="#{register.placeholder.fullname}" />
        </div>

        <div>
          <label for="username" class="block text-sm sm:text-base font-medium text-gray-300 mb-2" th:text="#{register.label.username}">Потребителско име</label>
          <input id="username" th:field="*{username}" type="text" required
                 class="w-full px-4 sm:px-5 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-200"
                 th:placeholder="#{register.placeholder.username}" />
        </div>

        <div>
          <label for="email" class="block text-sm sm:text-base font-medium text-gray-300 mb-2" th:text="#{register.label.email}">Имейл адрес</label>
          <input id="email" th:field="*{email}" type="email" required
                 class="w-full px-4 sm:px-5 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-200"
                 th:placeholder="#{register.placeholder.email}" />
        </div>

        <div>
          <label for="password" class="block text-sm sm:text-base font-medium text-gray-300 mb-2" th:text="#{register.label.password}">Парола</label>
          <input id="password" th:field="*{password}" type="password" required
                 class="w-full px-4 sm:px-5 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-200"
                 th:placeholder="#{register.placeholder.password}" />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm sm:text-base font-medium text-gray-300 mb-2" th:text="#{register.label.confirm_password}">Потвърдете паролата</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required
                 class="w-full px-4 sm:px-5 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-200"
                 th:placeholder="#{register.placeholder.confirm_password}" />
        </div>

        <button type="submit"
                class="w-full py-3 px-4 bg-white text-black font-semibold rounded-lg border border-white hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-900 transition-all duration-200 shadow-lg"
                th:text="#{register.btn.submit}">
          Регистрация
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-400 text-sm sm:text-base">
          <span th:text="#{register.footer.text}">Вече имате акаунт?</span>
          <a th:href="@{/login}" class="text-white hover:text-gray-300 font-medium underline underline-offset-4" th:text="#{register.footer.link}">Влезте тук</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 600, easing: 'ease-out', once: true });
</script>
</body>
</html>
