<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Детайли за пътуване</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0a0a0f] text-white min-h-screen">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="max-w-6xl mx-auto px-4 mt-10">
  <div class="grid lg:grid-cols-3 gap-8" th:object="${trip}">
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-[#12121a] rounded-2xl p-6 shadow-lg">
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-3xl font-bold text-white">
            <span th:text="*{origin}"></span> → <span th:text="*{destination}"></span>
          </h1>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-6">
          <div class="space-y-4">
            <div class="flex items-center space-x-3">
              <span class="text-2xl">📅</span>
              <div>
                <p class="text-gray-400 text-sm">Дата и час</p>
                <p class="text-white font-medium" th:text="${#temporals.format(trip.departureDateTime, 'dd.MM.yyyy HH:mm')}"></p>
              </div>
            </div>
            <div class="flex items-center space-x-3">
              <span class="text-2xl">🚗</span>
              <div>
                <p class="text-gray-400 text-sm">Автомобил</p>
                <p class="text-white font-medium" th:text="*{car}"></p>
              </div>
            </div>
          </div>
          <div class="space-y-4">
            <div class="flex items-center space-x-3">
              <span class="text-2xl">👤</span>
              <div>
                <p class="text-gray-400 text-sm">Шофьор</p>
                <div class="flex items-center space-x-2">
                  <p class="text-white font-medium" th:text="*{driver.fullName}"></p>
                </div>
              </div>
            </div>
            <div class="flex items-center space-x-3">
              <span class="text-2xl">🪑</span>
              <div>
                <p class="text-gray-400 text-sm">Свободни места</p>
                <p class="text-white font-medium" th:text="${seatsAvailable} + ' налични'"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="border-t border-gray-700 pt-4">
          <p class="text-gray-400 text-sm mb-2">Описание</p>
          <p class="text-white" th:text="*{description}"></p>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      <div class="bg-[#12121a] rounded-2xl p-6 shadow-lg space-y-4">
        <form th:action="@{'/trips/' + ${trip.id} + '/book'}" method="post" th:if="${seatsAvailable > 0}">
          <button type="submit"
                  class="w-full py-4 px-6 bg-white text-black font-semibold rounded-lg border border-white shadow-lg text-lg">
            🎫 Заяви място
          </button>
        </form>
        <p class="text-center text-gray-400 text-sm" th:if="${seatsAvailable > 0}">
          Потвърждение ще получите в чата
        </p>
        <p class="text-center text-red-500 text-sm" th:if="${seatsAvailable == 0}">
          Няма свободни места
        </p>

        <a th:href="@{'/chat/' + ${trip.driver.username}}"
           class="block py-3 px-6 text-center bg-white text-black font-semibold rounded-lg border border-white shadow-md">
          💬 Пиши на шофьора
        </a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
