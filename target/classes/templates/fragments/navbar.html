<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navbar">

  <nav class="sticky top-0 z-50 w-full bg-black/20 backdrop-blur-xl border-b border-white/10 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-20">

        <div class="flex-1 flex justify-start">
          <a href="/" class="group">
            <div class="text-2xl font-bold text-white tracking-tighter group-hover:opacity-80 transition-opacity">
              Trippzo
            </div>
          </a>
        </div>

        <div class="hidden md:flex items-center justify-center space-x-10 flex-[2]">
          <a href="/" class="text-[11px] font-bold text-zinc-400 hover:text-white uppercase tracking-[0.2em] transition-colors">Начало</a>
          <a href="/trips/search" class="text-[11px] font-bold text-zinc-400 hover:text-white uppercase tracking-[0.2em] transition-colors">Търсене</a>
          <a href="/trips/create" class="text-[11px] font-bold text-zinc-400 hover:text-white uppercase tracking-[0.2em] transition-colors">Създаване</a>

          <div sec:authorize="isAuthenticated()" class="flex items-center space-x-10">
            <a href="/profile" class="text-[11px] font-bold text-zinc-400 hover:text-white uppercase tracking-[0.2em] transition-colors">Профил</a>
            <a href="/chat" class="relative text-[11px] font-bold text-zinc-400 hover:text-white uppercase tracking-[0.2em] transition-colors">
              Съобщения
              <span id="desktopUnreadBadge"
                    class="absolute -top-3 -right-5 min-w-[18px] h-[18px] bg-white text-black text-[9px] font-black rounded-full flex items-center justify-center shadow-xl border border-black/10"
                    th:text="${unreadMessages}"
                    th:classappend="${unreadMessages == null || unreadMessages == 0} ? 'hidden' : ''">0</span>
            </a>
          </div>
        </div>

        <div class="flex-1 flex justify-end items-center space-x-6">
          <div sec:authorize="!isAuthenticated()" class="flex items-center space-x-6">
            <a href="/login" class="text-[11px] font-bold text-zinc-300 hover:text-white uppercase tracking-widest transition-colors">Вход</a>
            <a href="/register"
               class="px-5 py-2.5 bg-white text-black text-[11px] rounded-full font-black uppercase tracking-wider hover:bg-zinc-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:scale-105">
              Регистрация
            </a>
          </div>

          <div sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="text-[11px] font-bold text-zinc-500 hover:text-red-400 uppercase tracking-widest transition-colors">
                Изход
              </button>
            </form>
          </div>

          <div class="md:hidden ml-4">
            <button id="mobile-menu-button" class="text-white hover:text-zinc-400 transition-colors p-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-black/95 backdrop-blur-2xl border-b border-white/10">
      <div class="flex flex-col items-center py-10 space-y-8">
        <a href="/" class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Начало</a>
        <a href="/trips/search" class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Търсене</a>
        <a href="/trips/create" class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Създаване</a>

        <div sec:authorize="isAuthenticated()" class="flex flex-col items-center space-y-8 w-full">
          <a href="/profile" class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Профил</a>
          <a href="/chat" class="text-sm font-bold text-zinc-400 uppercase tracking-widest flex items-center">
            Съобщения
            <span id="mobileMenuBadge" class="ml-2 px-2 py-0.5 bg-white text-black text-[10px] font-bold rounded-full"
                  th:text="${unreadMessages}"
                  th:classappend="${unreadMessages == null || unreadMessages == 0} ? 'hidden' : ''">0</span>
          </a>
        </div>

        <div sec:authorize="!isAuthenticated()" class="flex flex-col items-center space-y-6 w-full px-10 pt-4 border-t border-white/5">
          <a href="/login" class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Вход</a>
          <a href="/register" class="w-full text-center py-4 bg-white text-black rounded-full font-black uppercase tracking-widest">Регистрация</a>
        </div>
      </div>
    </div>
  </nav>

  <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", function() {
      const button = document.getElementById('mobile-menu-button');
      const menu = document.getElementById('mobile-menu');

      if(button && menu) {
        button.addEventListener('click', () => {
          menu.classList.toggle('hidden');
        });
      }

      if (typeof SockJS !== 'undefined') {
          const socket = new SockJS('/ws-chat');
          const stompClient = Stomp.over(socket);
          stompClient.debug = null; // Спираме досадните логове

          stompClient.connect({}, function(frame){
            stompClient.subscribe('/user/queue/unread-count', function(message){
              const count = parseInt(message.body);
              const badges = [
                document.getElementById('desktopUnreadBadge'),
                document.getElementById('mobileMenuBadge')
              ];

              badges.forEach(badge => {
                if(!badge) return;
                if(count > 0){
                  badge.textContent = count;
                  badge.classList.remove('hidden');
                } else {
                  badge.classList.add('hidden');
                }
              });
            });
          });
      }
    });
    /*]]>*/
  </script>

</div>
</body>
</html>
